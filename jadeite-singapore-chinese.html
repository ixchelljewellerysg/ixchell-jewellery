  <style>
    :root{
      --bg:#f4f6fa;
      --bg-soft:#eef3f8;
      --card:rgba(255,255,255,.94);
      --text:#111827;
      --muted:#64748b;
      --brand:#183153;
      --brand-deep:#0f243c;
      --line:rgba(17,24,39,.08);
      --shadow:0 24px 70px rgba(15,23,42,.10);
      --soft:0 14px 38px rgba(15,23,42,.07);
      --radius:30px;
      --max:1080px;
    }

    *{ box-sizing:border-box; }

    html{
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      font-family:"Noto Sans TC","Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(24,49,83,.12), transparent 32%),
        linear-gradient(180deg,#ffffff 0%,#eef3f8 46%,#f8fafc 100%);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    img{ display:block; width:100%; height:auto; }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      width:min(100%,var(--max));
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }

    .topbar-brand{
      font-family:"Space Grotesk",sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--brand);
    }

    .topbar-links{
      display:flex;
      align-items:center;
      gap:14px;
      font-family:"Space Grotesk",sans-serif;
      font-size:13px;
      font-weight:700;
      color:var(--brand);
      white-space:nowrap;
    }

    .hero{
      min-height:100svh;
      position:relative;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      text-align:center;
      padding:40px 18px 82px;
      color:white;
      background:
        linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.80)),
        url("./hero.jpg") center/cover no-repeat;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-20%;
      background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.20),transparent 28%);
      animation:heroGlow 7s ease-in-out infinite;
    }

    @keyframes heroGlow{
      0%,100%{transform:scale(1);opacity:.6}
      50%{transform:scale(1.08);opacity:1}
    }

    .hero-inner{
      position:relative;
      z-index:2;
      width:min(100%,860px);
    }

    .hero-logo{
      width:82px;
      margin:0 auto 18px;
      background:rgba(255,255,255,.94);
      padding:8px;
      box-shadow:0 18px 42px rgba(0,0,0,.22);
    }

    .hero-tag,
    .mini-title{
      font-family:"Space Grotesk",sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--brand);
    }

    .hero-tag{
      display:inline-block;
      color:white;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      padding:9px 16px;
      border-radius:999px;
      margin-bottom:18px;
    }

    .hero h1{
      margin:0;
      font-family:"Noto Serif TC","Playfair Display",serif;
      font-size:clamp(38px,8vw,72px);
      line-height:1.12;
      letter-spacing:-.06em;
    }

    .hero p{
      max-width:720px;
      margin:20px auto 0;
      font-family:"Noto Serif TC","Playfair Display",serif;
      font-size:clamp(18px,4vw,24px);
      line-height:1.75;
      color:rgba(255,255,255,.90);
    }

    .page{
      width:min(100%,var(--max));
      margin:0 auto;
      padding:46px 16px 300px;
    }

    .section-wrap{
      margin-top:24px;
      padding:10px;
      border-radius:38px;
      background:
        radial-gradient(circle at top left,rgba(24,49,83,.08),transparent 34%),
        linear-gradient(180deg,rgba(255,255,255,.62),rgba(238,243,248,.56));
      border:1px solid rgba(17,24,39,.05);
    }

    .card{
      margin-top:24px;
      padding:32px 24px;
      border-radius:var(--radius);
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--soft);
      backdrop-filter:blur(18px);
      transition:transform .35s ease, box-shadow .35s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow);
    }

    .card-dark{
      background:
        radial-gradient(circle at top,rgba(80,130,190,.30),transparent 32%),
        linear-gradient(180deg,#143250,#0a1728);
      color:white;
      box-shadow:0 30px 80px rgba(10,23,40,.26);
    }

    .card-dark h2,
    .card-dark p,
    .card-dark .mini-title{ color:white; }

    .left{text-align:left;}
    .center{text-align:center;}

    h2{
      margin:0
