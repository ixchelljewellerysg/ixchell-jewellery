<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>新加坡翡翠｜翡坊翠藝 Ixchell Jewellery</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:#f5f7fb;
  color:#111;
}

/* LOADER */
.loader{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  color:white;
  font-family:"Noto Serif TC";
  font-size:22px;
  letter-spacing:2px;
  animation:fadeOut 1s ease 2s forwards;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* HERO */
.hero{
  height:100vh;
  background:url('./hero.jpg') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:700px;
  padding:20px;
}

.hero h1{
  font-family:"Noto Serif TC";
  font-size:42px;
  line-height:1.3;
  letter-spacing:-1px;
}

.hero p{
  margin-top:15px;
  font-size:18px;
  opacity:0.9;
}

.button{
  display:inline-block;
  margin-top:25px;
  padding:14px 26px;
  border-radius:30px;
  background:white;
  color:#111;
  font-weight:600;
}

/* SECTION */
.section{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
}

.card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:40px;
  border-radius:20px;
  margin-top:40px;
  box-shadow:0 10px 40px rgba(0,0,0,0.05);
}

h2{
  font-family:"Noto Serif TC";
  font-size:30px;
  line-height:1.4;
}

p{
  color:#555;
  line-height:1.9;
}

/* SCROLL ANIMATION */
.fade{
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

.fade.show{
  opacity:1;
  transform:none;
}

</style>
</head>

<body>

<div class="loader">Ixchell Jewellery</div>

<section class="hero">
  <div class="hero-content">
    <h1>不是每一件翡翠，<br>都需要被解釋。</h1>
    <p>看懂之後，自然會知道。</p>
    <a href="https://instagram.com/ixchelljewellery" class="button">預約鑑賞</a>
  </div>
</section>

<div class="section fade">
  <div class="card">
    <h2>在這裡，慢慢看見翡翠真正的樣子</h2>
    <p>奢華不必張揚。真正值得留下的東西，往往很安靜。</p>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h2>只專注於天然 Type A 緬甸翡翠</h2>
    <p>翡翠不需要被說服，看懂之後，自然會選擇。</p>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h2>翡翠的價值</h2>
    <p>Ixchell Jewellery 不以價格比較翡翠，而是從結構與形成去理解。</p>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h2>有些東西，不適合匆忙決定</h2>
    <p>預約一段安靜的時間，親自來看。</p>
    <a href="https://instagram.com/ixchelljewellery" class="button">預約鑑賞</a>
  </div>
</div>

<script>
const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  faders.forEach(el=>{
    const top=el.getBoundingClientRect().top;
    if(top<window.innerHeight-50){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
