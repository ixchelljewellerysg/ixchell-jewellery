<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Ixchell Jewellery Singapore | Type A Burmese Jadeite Boutique Near City Hall MRT</title>
  <meta
    name="description"
    content="Ixchell Jewellery is a private jadeite boutique in Singapore near City Hall MRT, specialising in natural Type A Burmese jadeite jewellery, bangles, earrings and collector pieces. Private viewing by appointment."
  />
  <meta name="theme-color" content="#183153" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root{
      --bg:#f5f6fa;
      --bg-soft:#eef2f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#5f6978;
      --brand:#183153;
      --brand-deep:#10233d;
      --line:rgba(17,24,39,0.08);
      --shadow:0 18px 42px rgba(15,23,42,0.06);
      --shadow-strong:0 24px 60px rgba(15,23,42,0.10);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:18px;
      --max:1120px;
      --hero-overlay:rgba(0,0,0,0.48);
    }

    *{
      box-sizing:border-box;
      min-width:0;
    }

    html{
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, #f8f9fc 34%, #eef2f7 100%);
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      max-width:100%;
      height:auto;
    }

    .site-loader{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      transition:opacity 0.8s ease, visibility 0.8s ease;
    }

    .site-loader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .site-loader__wordmark{
      color:#fff;
      font-family:"Space Grotesk",sans-serif;
      font-size:22px;
      font-weight:600;
      letter-spacing:0.18em;
      text-transform:uppercase;
      animation:loaderPulse 1.7s ease forwards;
      text-align:center;
      padding:0 20px;
    }

    @keyframes loaderPulse{
      from{
        opacity:0;
        transform:scale(0.985);
        letter-spacing:0.36em;
      }
      to{
        opacity:1;
        transform:scale(1);
        letter-spacing:0.18em;
      }
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(247,248,251,0.86);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(17,24,39,0.06);
    }

    .topbar__inner{
      width:min(100%, var(--max));
      margin:0 auto;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .topbar__brand{
      font-family:"Space Grotesk",sans-serif;
      font-size:11px;
      line-height:1.35;
      letter-spacing:0.10em;
      font-weight:700;
      text-transform:uppercase;
      color:var(--brand);
    }

    .topbar__visit{
      font-size:13px;
      font-weight:700;
      color:var(--brand);
      white-space:nowrap;
    }

    .hero{
      position:relative;
      min-height:100svh;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      text-align:center;
      padding:32px 16px 58px;
      color:#fff;
      overflow:hidden;
      background:
        linear-gradient(var(--hero-overlay), rgba(0,0,0,0.62)),
        url("./hero.jpg") center/cover no-repeat;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,0.12), transparent 34%),
        radial-gradient(circle at 78% 70%, rgba(187,164,255,0.12), transparent 30%);
      animation:heroFloat 10s ease-in-out infinite alternate;
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.34) 44%, rgba(0,0,0,0.08) 100%);
      pointer-events:none;
    }

    @keyframes heroFloat{
      from{ transform:scale(1) translateY(0); opacity:.88; }
      to{ transform:scale(1.05) translateY(-8px); opacity:1; }
    }

    .hero__inner{
      position:relative;
      z-index:2;
      width:min(100%, 860px);
    }

    .hero__logo{
      width:84px;
      margin:0 auto 18px;
      padding:8px;
      background:rgba(255,255,255,0.94);
      border-radius:2px;
      box-shadow:0 10px 30px rgba(0,0,0,0.16);
    }

    .hero__tag{
      display:inline-block;
      margin-bottom:16px;
      padding:8px 14px;
      border:1px solid rgba(255,255,255,0.24);
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      font-family:"Space Grotesk",sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.10em;
      text-transform:uppercase;
    }

    .hero h1{
      margin:0;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(38px, 8.6vw, 82px);
      line-height:0.97;
      letter-spacing:-0.055em;
      text-wrap:balance;
    }

    .hero p{
      max-width:720px;
      margin:18px auto 0;
      font-family:"Playfair Display",serif;
      font-size:clamp(17px, 4.3vw, 22px);
      line-height:1.72;
      color:rgba(255,255,255,0.92);
      text-wrap:balance;
    }

    .hero__actions{
      margin-top:28px;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
    }

    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:14px 22px;
      border-radius:999px;
      font-family:"Space Grotesk",sans-serif;
      font-size:15px;
      font-weight:700;
      letter-spacing:0.02em;
      text-decoration:none;
      transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease, background .22s ease;
      cursor:pointer;
    }

    .button:hover{
      transform:translateY(-2px);
      opacity:0.98;
    }

    .button--light{
      background:#fff;
      color:#111;
      box-shadow:0 12px 28px rgba(0,0,0,0.18);
    }

    .button--ghost{
      background:rgba(255,255,255,0.10);
      color:#fff;
      border:1px solid rgba(255,255,255,0.24);
    }

    .button--dark{
      background:var(--brand);
      color:#fff;
      box-shadow:0 12px 24px rgba(24,49,83,0.16);
    }

    .page{
      width:min(100%, var(--max));
      margin:0 auto;
      padding:40px 16px 250px;
    }

    .logo-divider{
      width:56px;
      margin:20px auto 10px;
      opacity:.82;
    }

    .card{
      width:100%;
      margin-top:22px;
      padding:30px 22px;
      border-radius:var(--radius-xl);
      background:rgba(255,255,255,0.96);
      border:1px solid rgba(17,24,39,0.06);
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      transition:transform .30s ease, box-shadow .30s ease, border-color .30s ease;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow-strong);
      border-color:rgba(24,49,83,0.10);
    }

    .card--dark{
      background:linear-gradient(180deg, var(--brand), var(--brand-deep));
      color:#fff;
    }

    .card--dark .mini-title,
    .card--dark h2,
    .card--dark h3,
    .card--dark p{
      color:#fff;
    }

    .center{ text-align:center; }
    .left{ text-align:left; }

    .mini-title{
      margin-bottom:10px;
      font-family:"Space Grotesk",sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.10em;
      text-transform:uppercase;
      color:var(--brand);
    }

    h2{
      margin:0 0 12px;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(29px, 7vw, 44px);
      line-height:1.08;
      letter-spacing:-0.02em;
      text-wrap:balance;
    }

    h3{
      margin:0 0 8px;
      font-family:"Space Grotesk",sans-serif;
      font-size:18px;
      line-height:1.3;
      text-wrap:balance;
    }

    p{
      margin:0 0 12px;
      font-size:16px;
      line-height:1.8;
      color:var(--muted);
      text-wrap:pretty;
      overflow-wrap:break-word;
    }

    .statement{
      max-width:830px;
      margin:0 auto;
      font-family:"Playfair Display",serif;
      font-size:20px;
      line-height:1.74;
      color:#111827;
    }

    .lead{
      font-size:17px;
      color:#1f2937;
    }

    .luxury{
      font-family:"Playfair Display",serif;
      font-size:17px;
      line-height:1.78;
      color:#4c5564;
    }

    .two-col,
    .gift-grid,
    .learn-grid,
    .visit-grid,
    .editorial-grid,
    .gallery{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      width:100%;
    }

    .pill-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      padding:9px 13px;
      border-radius:999px;
      background:#f2f6fb;
      border:1px solid rgba(24,49,83,0.10);
      color:var(--brand);
      font-size:14px;
      font-weight:700;
      font-family:"Space Grotesk",sans-serif;
    }

    .trust-list{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .trust-item{
      padding:13px 14px;
      border-radius:14px;
      background:#f8fbff;
      border:1px solid #dde7f2;
      color:var(--brand-deep);
      font-weight:700;
      line-height:1.55;
    }

    .campaign{
      margin:76px 0 68px;
      display:flex;
      flex-direction:column;
      gap:26px;
    }

    .campaign-image{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      padding:16px;
      border-radius:28px;
      background:linear-gradient(180deg,#fbf8ff,#f6f7fb);
      box-shadow:0 18px 44px rgba(18,30,54,0.08);
    }

    .campaign-image::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.34), transparent 32%);
      pointer-events:none;
      z-index:0;
    }

    .campaign-image::after{
      content:"";
      position:absolute;
      right:-10%;
      bottom:-22%;
      width:220px;
      height:220px;
      background:radial-gradient(circle, rgba(191,164,255,0.18) 0%, rgba(191,164,255,0) 72%);
      pointer-events:none;
      z-index:0;
    }

    .campaign-image img{
      position:relative;
      z-index:1;
      border-radius:14px;
      box-shadow:0 18px 34px rgba(24,49,83,0.10);
      aspect-ratio:4/5;
      object-fit:cover;
    }

    .campaign-text{
      padding:6px 8px 0;
    }

    .label{
      font-family:"Space Grotesk",sans-serif;
      font-size:11px;
      letter-spacing:2px;
      text-transform:uppercase;
      color:#8a8a8a;
    }

    .campaign h2{
      margin:10px 0 16px;
      font-size:clamp(30px, 6vw, 42px);
      line-height:1.02;
      letter-spacing:-0.03em;
    }

    .campaign p{
      margin-bottom:12px;
      font-size:16px;
      line-height:1.82;
      color:var(--muted);
    }

    .cinematic{
      position:relative;
      overflow:hidden;
      margin-top:24px;
      padding:86px 24px;
      border-radius:34px;
      text-align:center;
      color:#fff;
      background:
        radial-gradient(circle at 50% 35%, rgba(33,72,118,0.52), transparent 30%),
        linear-gradient(180deg, #081728 0%, #0d1b2a 100%);
      box-shadow:0 24px 60px rgba(7,17,32,0.22);
    }

    .cinematic h2{
      color:#fff;
      font-size:clamp(34px, 7vw, 54px);
      line-height:1.04;
      letter-spacing:-0.04em;
    }

    .cinematic p{
      max-width:680px;
      margin:0 auto;
      font-size:18px;
      line-height:1.8;
      color:rgba(255,255,255,0.84);
    }

    .collector{
      margin:78px 0;
      padding:52px 28px;
      border-radius:34px;
      text-align:center;
      color:#fff;
      background:
        radial-gradient(circle at 50% 28%, rgba(51,104,164,0.34), transparent 28%),
        linear-gradient(180deg, #143050 0%, #0f243c 100%);
      box-shadow:0 24px 60px rgba(15,36,60,0.20);
    }

    .collector-inner{
      max-width:560px;
      margin:0 auto;
    }

    .collector h2{
      margin:12px 0 18px;
      font-size:clamp(32px, 7vw, 46px);
      line-height:1.04;
      letter-spacing:-0.04em;
    }

    .collector p{
      color:rgba(255,255,255,0.86);
      font-size:16px;
      line-height:1.84;
    }

    .collector .label{
      color:rgba(255,255,255,0.78);
    }

    .gift-item,
    .learn-item,
    .visit-tile{
      padding:16px;
      border-radius:18px;
      background:var(--bg-soft);
      border:1px solid rgba(24,49,83,0.08);
    }

    .gift-item strong,
    .learn-item strong,
    .visit-tile strong{
      display:block;
      margin-bottom:6px;
      font-family:"Space Grotesk",sans-serif;
      color:#111827;
    }

    .featured-learn{
      padding:20px;
      border-radius:24px;
      background:linear-gradient(180deg,#f8fbff,#eef4fb);
      border:1px solid rgba(24,49,83,0.10);
      box-shadow:0 16px 34px rgba(24,49,83,0.08);
    }

    .featured-learn h3{
      font-size:22px;
      margin-bottom:8px;
    }

    .editorial-card{
      overflow:hidden;
      border-radius:18px;
      background:#fff;
      border:1px solid rgba(17,24,39,0.08);
      box-shadow:0 16px 38px rgba(15,23,42,0.08);
      transition:transform .28s ease, box-shadow .28s ease;
    }

    .editorial-card:hover{
      transform:translateY(-4px);
      box-shadow:0 24px 52px rgba(15,23,42,0.12);
    }

    .editorial-card img{
      aspect-ratio:4/5;
      object-fit:cover;
    }

    .editorial-copy{
      padding:14px;
    }

    .editorial-copy p{
      margin:0;
      font-size:14px;
      line-height:1.68;
    }

    .authority{
      margin-top:20px;
      text-align:center;
      font-family:"Playfair Display",serif;
      font-size:14px;
      letter-spacing:0.01em;
      opacity:.74;
    }

    .gallery-item{
      overflow:hidden;
      border-radius:18px;
      border:1px solid rgba(17,24,39,0.08);
      background:#fff;
      box-shadow:0 14px 34px rgba(15,23,42,0.06);
    }

    .gallery-item img{
      aspect-ratio:1/1;
      object-fit:cover;
    }

    .faq h3{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(17,24,39,0.08);
    }

    .faq h3:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:0;
    }

    .closing{
      max-width:780px;
      margin:0 auto;
      padding:18px 0 4px;
      text-align:center;
      font-family:"Playfair Display",serif;
      font-size:19px;
      line-height:1.8;
      color:#111827;
    }

    .floating{
      position:fixed;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:999;
      display:block;
      padding:13px 18px;
      border-radius:999px;
      background:linear-gradient(180deg,#1b3c69,#183153);
      color:#fff;
      text-align:center;
      text-decoration:none;
      font-family:"Space Grotesk",sans-serif;
      font-size:15px;
      font-weight:700;
      letter-spacing:0.01em;
      box-shadow:0 14px 30px rgba(10,23,43,0.24);
      transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease;
    }

    .floating:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 36px rgba(10,23,43,0.28);
      opacity:.99;
    }

    @media (max-width:760px){
      .hero h
