  /* --- Base Styles --- */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }

  .menu-container {
    padding: 20px;
    max-width: 400px; /* Adjust based on your mobile layout width */
    margin: 0 auto;
  }

  a {
    text-decoration: none;
    display: block;
    transition: opacity 0.2s ease;
  }

  a:hover {
    opacity: 0.7;
  }

  hr.divider {
    border: 0;
    border-top: 1px solid #333;
    margin: 24px 0;
  }

  /* --- Header --- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .icon-btn {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  .icon-btn svg {
    height: 24px;
    width: auto;
  }

  /* --- Main Navigation --- */
  .main-nav {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .main-nav a {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* --- Sub Navigation --- */
  .sub-nav {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .sub-nav a {
    color: #aaa; /* Lighter grey text */
    font-size: 16px;
    font-weight: 400;
  }

  /* --- Social Row --- */
  .footer-social-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-social-row .social-label {
    font-size: 16px;
    font-weight: 400;
    color: #fff;
  }

  .footer-social-row .social-icons {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .footer-social-row svg {
    height: 22px;
    width: auto;
    color: #fff;
  }

  /* --- Footer Links --- */
  .footer-nav {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .footer-nav a,
  .footer-nav .copyright {
    color: #888; /* Darker grey for bottom links */
    font-size: 14px;
    font-weight: 400;
  }

  .footer-nav .copyright {
    margin-top: 10px;
  }
